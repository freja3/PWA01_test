<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Nerd Stats v1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 10px; background: #334155; margin-bottom: 15px; display: inline-block; }
        
        /* De små kort øverst */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .card .val { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        
        /* Graffeltet */
        .chart-container { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; height: 250px; border: 1px solid #334155; }
        
        /* Tabellen med Nørd-stats */
        .nerd-box { background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.75rem; color: #4ade80; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; border-bottom: 1px solid #334155; padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid #111; }
        
        button { width: 100%; background: var(--primary); color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <div id="status" class="status-badge">Forbinder til sensorer...</div>
    </div>

    <div class="grid" id="live-cards"></div>

    <div class="chart-container">
        <canvas id="tempChart"></canvas>
    </div>

    <button onclick="updateData()">Opdater nu</button>

    <h3 style="font-size: 0.9rem; margin: 15px 0 5px 0;">Nørd Statistik (Live Session)</h3>
    <div class="nerd-box">
        <table>
            <thead><tr><th>Sensor</th><th>Min</th><th>Max</th><th>Avg</th></tr></thead>
            <tbody id="nerd-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Konfiguration - SKAL matche 'name' i din ESPHome YAML
    const sensorNames = ['DS18B20-1', 'DS18B20-2', 'DS18B20-3', 'DS18B20-4', 'DS18B20-5'];
    const espIp = '192.168.1.66';
    
    // Beholdere til data
    let history = {};
    sensorNames.forEach(name => history[name] = []);

    // Initialisér diagrammet
    const ctx = document.getElementById('tempChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: sensorNames.map((name, i) => ({
                label: name,
                data: [],
                borderColor: `hsl(${i * 65}, 70%, 55%)`,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.3
            }))
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                x: { display: false }
            },
            plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 10, font: { size: 10 } } } }
        }
    });

    async function updateData() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Henter...";
        statusEl.style.background = "#334155";
        
        let cardsHtml = "";
        let nerdHtml = "";
        const now = new Date().toLocaleTimeString('da-DK', {hour: '2-digit', minute:'2-digit', second:'2-digit'});

        for (const name of sensorNames) {
            try {
                // Vi henter data direkte fra hver sensor
                const res = await fetch(`http://${espIp}/sensor/${name}`);
                if (!res.ok) throw new Error();
                
                const data = await res.json();
                const val = parseFloat(data.value);

                if (!isNaN(val)) {
                    // Gem til historik (kun i denne session)
                    history[name].push(val);
                    if (history[name].length > 30) history[name].shift();

                    // Beregn Stats
                    const min = Math.min(...history[name]).toFixed(1);
                    const max = Math.max(...history[name]).toFixed(1);
                    const avg = (history[name].reduce((a,b) => a+b, 0) / history[name].length).toFixed(1);

                    cardsHtml += `<div class="card"><span style="font-size:0.6rem; color:#94a3b8">${name}</span><br><span class="val">${val}°</span></div>`;
                    nerdHtml += `<tr><td>${name}</td><td>${min}°</td><td>${max}°</td><td>${avg}°</td></tr>`;
                }
            } catch (e) {
                console.log("Kunne ikke hente " + name);
            }
        }

        // Opdater graf-labels
        chart.data.labels.push(now);
        if (chart.data.labels.length > 30) chart.data.labels.shift();

        // Opdater hver linje i grafen
        sensorNames.forEach((name, i) => {
            chart.data.datasets[i].data = history[name];
        });

        chart.update();
        document.getElementById('live-cards').innerHTML = cardsHtml;
        document.getElementById('nerd-body').innerHTML = nerdHtml;
        statusEl.innerText = "Sidst opdateret: " + now;
        statusEl.style.background = "#065f46"; // Grønlig når det virker
    }

    // Kør hvert 30. sekund
    setInterval(updateData, 30000);
    // Kør første gang med det samme
    updateData();
</script>
</body>
</html>
